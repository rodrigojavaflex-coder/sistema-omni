<div class="form-container">
  <h2>{{ getFormTitle() }} Tipo de Documento</h2>

  <div class="form-actions form-actions-top">
    <button type="button" class="btn btn-primary" [disabled]="loading" (click)="onSubmit()">
      @if (loading) {
        <span class="spinner"></span>
      }
      {{ loading ? 'Salvando...' : getSubmitButtonText() }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Informações do Tipo</h3>

      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input type="text" formControlName="nome" class="form-input" />
        @if (isFieldInvalid('nome')) {
          <div class="form-error">{{ getFieldError('nome') }}</div>
        }
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea formControlName="descricao" class="form-input" rows="3"></textarea>
      </div>

      <label class="checkbox-field">
        <input type="checkbox" formControlName="ativo" />
        Tipo ativo
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        @if (loading) {
          <span class="spinner"></span>
        }
        {{ loading ? 'Salvando...' : getSubmitButtonText() }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancelar</button>
    </div>
  </form>
</div>
