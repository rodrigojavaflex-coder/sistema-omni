<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Configurações</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="solid" (click)="voltar()">Voltar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content">
    <ion-item lines="none">
      <ion-label>
        Login por digital
        <p>Ative para entrar no aplicativo usando biometria.</p>
      </ion-label>
      <ion-toggle
        aria-label="Login por digital"
        [checked]="biometricEnabled"
        [disabled]="!biometricAvailable || biometricSaving"
        (ionChange)="onBiometricToggle($event)"
      ></ion-toggle>
    </ion-item>

    <ion-text color="medium" *ngIf="!biometricAvailable">
      <p class="info">Biometria não disponível neste dispositivo.</p>
    </ion-text>
  </div>
</ion-content>
